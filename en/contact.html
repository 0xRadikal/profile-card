<!doctype html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://github.com https://avatars.githubusercontent.com https://images.unsplash.com; connect-src 'self' https://api.github.com; manifest-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" />
  <link rel="icon" type="image/svg+xml" href="/profile-card/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact • Radikal</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="stylesheet" href="/profile-card/profile-card.css" />  <link rel="preload" href="/profile-card/assets/fonts/vazirmatn-arabic-400-normal.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/profile-card/assets/fonts/vazirmatn-arabic-700-normal.woff2" as="font" type="font/woff2" crossorigin />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="hud">
      <div class="scanline"></div>
      <div class="hud-corner tl"></div><div class="hud-corner tr"></div><div class="hud-corner bl"></div><div class="hud-corner br"></div>
    </div>
  </div>

  <main class="wrap">
    <section class="page" aria-labelledby="contact-title">
      <header class="page__header">
        <h1 id="contact-title">Contact me</h1>
        <a class="btn btn--ghost term" href="/profile-card/en/">&larr; Back</a>
      </header>

      <nav class="site-nav" aria-label="Routes">
        <a class="pill-link" href="/profile-card/en/">Home</a>
        <a class="pill-link" href="/profile-card/en/projects.html">Projects</a>
        <a class="pill-link" href="/profile-card/en/blog.html">Blog</a>
        <a class="pill-link" href="/profile-card/en/gallery.html">Gallery</a>
        <a class="pill-link" href="/profile-card/en/skills.html">Skills</a>
        <a class="pill-link" href="/profile-card/en/timeline.html">Timeline</a>
        <a class="pill-link" href="/profile-card/" hreflang="fa">FA</a>
      </nav>

      <p>Use the form for collaborations, security consulting, or Web3 chats.</p>
      <form class="card-form" id="contactForm" novalidate>
        <label>Full name
          <input name="name" required minlength="2" autocomplete="name" />
        </label>
        <label>Email
          <input name="email" type="email" required autocomplete="email" />
        </label>
        <label>Subject
          <input name="topic" required />
        </label>
        <label>Message
          <textarea name="message" rows="4" required minlength="10"></textarea>
        </label>
        <div class="cta-bar">
          <button class="btn btn--primary" type="submit">Send</button>
          <label class="mono"><input type="checkbox" name="copy" /> Send a copy to my email</label>
        </div>
        <p class="muted mono" id="formHint" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

<script type="module" src="/profile-card/pages/contact.js"></script>
</body>
</html>
